<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sentinel Eyes</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { border: 1px solid #444; background: #fff; }
  </style>
</head>
<body>
  <canvas id="canvas" width="1200" height="800"></canvas>
  <script>
    // WebSocket connection to send canvas captures back to Sentinel
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => console.log('Eyes connected');
    ws.onclose = () => console.log('Eyes disconnected');
    ws.onerror = (e) => console.error('Eyes error', e);

    document.getElementById('canvas').addEventListener('click', () => {
      const canvas = document.getElementById('canvas');
      canvas.toBlob(blob => {
        blob.arrayBuffer().then(buf => ws.send(buf));
      });
    });
  </script>
</body>
</html>
